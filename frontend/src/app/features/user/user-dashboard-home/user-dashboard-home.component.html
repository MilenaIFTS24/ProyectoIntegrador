<div class="user-dashboard-home animate__animated animate__fadeIn">
  <div class="welcome-banner">
    <div>
      <h1>{{ greeting }}, {{ userName() || 'Usuario' }}!</h1>
      <p class="text-muted">{{ userEmail() }}</p>
    </div>
    <div class="status-badge">
      <i class="bi bi-circle-fill text-success me-2"></i>
      <span>Cuenta activa</span>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon"><i class="bi bi-journal-check"></i></div>
      <div class="stat-info">
        <h3>{{ stats().totalReservations }}</h3>
        <p>Mis Reservas</p>
      </div>
    </div>



    <div class="stat-card">
      <div class="stat-icon"><i class="bi bi-calendar-event"></i></div>
      <div class="stat-info">
        <h3>{{ stats().upcomingEvents }}</h3>
        <p>Próximos Eventos</p>
      </div>
    </div>
  </div>

  <div class="quick-actions">
    <h4>Acciones Rápidas</h4>
    <div class="action-grid">
      <a routerLink="/userDashboard/makeReservation" class="action-card">
        <i class="bi bi-plus-circle"></i>
        <span>Nueva Reserva</span>
      </a>
      <a routerLink="/userDashboard/" class="action-card">
        <i class="bi bi-list-check"></i>
        <span>Ver Mis Reservas</span>
      </a>
      <a routerLink="/userDashboard/" class="action-card">
        <i class="bi bi-shop"></i>
        <span>Explorar Productos</span>
      </a>
      <a routerLink="/userDashboard/" class="action-card">
        <i class="bi bi-calendar-heart"></i>
        <span>Ver Eventos</span>
      </a>
    </div>
  </div>
</div>
